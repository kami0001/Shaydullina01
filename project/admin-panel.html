<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель администратора | Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">Учусь.<span>РФ</span></a>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <!-- Соцсети в шапке -->
                <div class="social-icons" style="margin-right: 1rem;">
                    <a href="#" class="social-icon" target="_blank" title="Одноклассники">
                        <img src="./assets/images/social/odnoc.png" alt="odnoc">
                    </a>
                    <a href="#" class="social-icon" target="_blank" title="VK">
                        <img src="assets/images/social/vk.png" alt="ВКонтакте">
                    </a>
                </div>
                <button class="hamburger" aria-label="Меню">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <nav></nav>
        </div>
    </header>

    <main>
        <h1 style="color: var(--primary-dark); margin-bottom: 2rem;">
            <i class="fas fa-shield-alt"></i> Панель администратора
        </h1>

        <!-- Форма входа в админку -->
        <div id="admin-login-form" style="display: none;">
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <h3 style="text-align: center; color: var(--primary-dark);">Вход в админ-панель</h3>
                <form id="admin-login-form-inner">
                    <div class="form-group">
                        <label for="admin-login">Логин</label>
                        <input type="text" id="admin-login" placeholder="Admin26" value="Admin26">
                    </div>
                    <div class="form-group">
                        <label for="admin-password">Пароль</label>
                        <input type="password" id="admin-password" placeholder="Demo20" value="Demo20">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Войти как администратор</button>
                </form>
            </div>
        </div>

        <!-- Контент админ-панели -->
        <div id="admin-content" style="display: none;">
            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="stat-new">0</div>
                    <div class="stat-label">📌 Новых заявок</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-progress">0</div>
                    <div class="stat-label">⏳ В процессе</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-completed">0</div>
                    <div class="stat-label">✅ Завершено</div>
                </div>
            </div>

            <!-- Фильтры -->
            <div class="card">
                <div class="filters">
                    <select id="filter-status">
                        <option value="Все">Все статусы</option>
                        <option value="Новая">Новая</option>
                        <option value="Идет обучение">Идет обучение</option>
                        <option value="Обучение завершено">Обучение завершено</option>
                    </select>
                    <input type="text" id="filter-search" placeholder="🔍 Поиск по курсу...">
                </div>

                <!-- Таблица -->
                <div class="table-responsive">
                    <table id="requests-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Пользователь</th>
                                <th>Курс</th>
                                <th>Дата старта</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- Пагинация -->
                <div class="pagination"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-social">
            <p>© 2026 Учусь.РФ. Все права защищены.</p>
            <div class="social-icons">
                <a href="#" class="social-icon" target="_blank" title="Telegram">
                    <img src="assets/images/social/telegram.png" alt="Telegram">
                </a>
                <a href="#" class="social-icon" target="_blank" title="VK">
                    <img src="assets/images/social/vk.png" alt="ВКонтакте">
                </a>
                <a href="#" class="social-icon" target="_blank" title="YouTube">
                    <img src="assets/images/social/youtube.png" alt="YouTube">
                </a>
                <a href="#" class="social-icon" target="_blank" title="WhatsApp">
                    <img src="assets/images/social/whatsapp.png" alt="WhatsApp">
                </a>
                <a href="#" class="social-icon" target="_blank" title="Instagram">
                    <img src="assets/images/social/instagram.png" alt="Instagram">
                </a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
