<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход | Учусь.РФ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">Учусь.<span>РФ</span></a>
            <button class="hamburger" aria-label="Меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav></nav>
        </div>
    </header>

    <main>
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2 style="text-align: center; color: var(--primary-dark); margin-bottom: 2rem;">
                <i class="fas fa-graduation-cap"></i> Добро пожаловать
            </h2>

            <div class="tabs">
                <button class="tab-btn active" id="login-tab">Вход</button>
                <button class="tab-btn" id="register-tab">Регистрация</button>
            </div>

            <!-- Вход -->
            <div class="tab-content active" id="login-content">
                <form id="login-form">
                    <div id="login-error" style="color: var(--danger); margin-bottom: 1rem; display: none;"></div>
                    
                    <div class="form-group">
                        <label for="login-username">Логин</label>
                        <input type="text" id="login-username" placeholder="Введите логин" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" placeholder="Введите пароль" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Войти</button>

                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="#" onclick="document.getElementById('register-tab').click(); return false;" style="color: var(--primary); text-decoration: none;">
                            Еще не зарегистрированы? Регистрация
                        </a>
                    </div>
                </form>
            </div>

            <!-- Регистрация -->
            <div class="tab-content" id="register-content">
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-login">Логин *</label>
                        <input type="text" id="reg-login" placeholder="Только латиница и цифры, мин. 6 символов" required>
                        <span class="help-text">Минимум 6 символов, только латиница и цифры</span>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Пароль *</label>
                        <input type="password" id="reg-password" placeholder="Минимум 8 символов" required>
                        <span class="help-text">Минимум 8 символов</span>
                    </div>

                    <div class="form-group">
                        <label for="reg-fullname">ФИО *</label>
                        <input type="text" id="reg-fullname" placeholder="Иванов Иван Иванович" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-phone">Контактный телефон</label>
                        <input type="tel" id="reg-phone" placeholder="+7 (XXX) XXX-XX-XX">
                        <span class="help-text">Формат: +7 (XXX) XXX-XX-XX</span>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">E-mail *</label>
                        <input type="email" id="reg-email" placeholder="example@mail.ru" required>
                        <span class="help-text">Введите корректный email</span>
                    </div>

                    <button type="submit" class="btn btn-success btn-block">Зарегистрироваться</button>

                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="#" onclick="document.getElementById('login-tab').click(); return false;" style="color: var(--primary); text-decoration: none;">
                            Уже зарегистрированы? Войти
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Учусь.РФ. Все права защищены.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
